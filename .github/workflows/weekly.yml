name: weekly-pipeline

on:
  schedule:
    # Tuesdays 20:00 UTC (22:00 CEST). Evening-of-author timezone so a
    # human is awake when the run lands and can react to any failure
    # before the next-day workflow window.
    - cron: "0 20 * * 2"
  workflow_dispatch:
    inputs:
      max_per_framework:
        description: "Cap issues per framework (leave blank for no cap)"
        required: false
        default: ""
      push:
        description: "Push snapshot to HF Hub"
        required: false
        type: boolean
        default: true

permissions:
  contents: write  # to commit the state file back to the repo

jobs:
  run:
    name: scrape-classify-publish
    runs-on: ubuntu-latest
    # 360 = GitHub's hard ceiling for a single job. Generous on purpose:
    # the pipeline saves scrape state only on a full successful run, so a
    # timeout loses all progress and the next run re-scrapes a bigger
    # back-window. Steady-state weekly runs finish in ~1h; the headroom
    # is there to drain an accumulated backlog without re-entering that
    # cycle.
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history to commit state updates

      - name: install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"  # we don't ship a uv.lock

      - name: sync dependencies
        run: |
          uv venv --python 3.12
          uv pip install -e .

      - name: run pipeline
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HF_REPO_ID: ${{ vars.HF_REPO_ID }}
          MAX_PER_FRAMEWORK: ${{ inputs.max_per_framework }}
          PUSH_TO_HUB: ${{ inputs.push == '' && 'true' || inputs.push }}
        run: |
          args=(--output-dir data/snapshots --state-path data/pipeline_state.json)
          if [ -n "${MAX_PER_FRAMEWORK}" ]; then
            args+=(--max-per-framework "${MAX_PER_FRAMEWORK}")
          fi
          if [ "${PUSH_TO_HUB}" = "true" ]; then
            args+=(--push --hf-repo-id "${HF_REPO_ID}")
          fi
          uv run arc-pipeline "${args[@]}"

      - name: commit updated state
        run: |
          git config user.name "arc-bot"
          git config user.email "bot@agent-reliability-corpus.local"
          # data/ is in .gitignore (local scratch dir for snapshots), but
          # pipeline_state.json is tracked-on-purpose — modern git exits 1
          # on `git add` for paths under an ignored dir even when the file
          # itself is tracked, so we force-add this specific file.
          git add -f data/pipeline_state.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update pipeline state ($(date -u +%Y-%m-%d))"
            # A commit may have landed on main during the ~20min run; rebase
            # our one-file state commit onto it before pushing, else the
            # push is rejected as non-fast-forward.
            git pull --rebase origin main
            git push
          else
            echo "no state changes to commit"
          fi
